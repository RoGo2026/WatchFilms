<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Найти фильм на Кинопоиск</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎬 Поиск фильма</h1>
        <p>Введите название фильма и выберите подходящий вариант из списка.</p>
        
        <div class="search-box">
            <input type="text" id="movieInput" placeholder="Например: Интерстеллар">
            <button id="searchButton">Найти</button>
        </div>

        <div id="loading" class="loading hidden">Поиск...</div>
        <div id="results" class="results"></div>
        <div id="error" class="error hidden"></div>
        
        <div class="note">
            ⚠️ Внимание: сайт с доменом .net не является официальным. Используйте на свой страх и риск.
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
