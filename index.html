<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск фильмов</title>
    <style>
        body { background:#111; color:white; font-family:Arial; text-align:center; padding-top:50px; }
        input { width:500px; padding:15px; font-size:18px; border-radius:8px; border:none; margin:10px; }
        button { padding:15px 30px; font-size:18px; background:#e50914; color:white; border:none; border-radius:8px; cursor:pointer; margin:10px; }
        h2 { margin-top:40px; }
    </style>
</head>
<body>
    <h1>Поиск фильмов</h1>
    
    <input type="text" id="search" placeholder="Название фильма (открывает поиск)" onkeydown="if(event.key === 'Enter') searchKP()" />
    <button onclick="searchKP()">Открыть поиск</button>

    <h2>Или вставь ссылку с Кинопоиска</h2>
    <input type="text" id="url" placeholder="Вставь сюда ссылку с kinopoisk.ru" onkeydown="if(event.key === 'Enter') replaceDomain()" />
    <button onclick="replaceDomain()">Заменить на .net и открыть</button>

    <script>
    function searchKP() {
        let name = document.getElementById("search").value.trim();
        if (name) {
            let link = "https://www.kinopoisk.ru/index.php?kp_query=" + encodeURIComponent(name);
            window.open(link, "_blank");
        }
    }

    function replaceDomain() {
        let url = document.getElementById("url").value.trim();
        if (url) {
            let newUrl = url.replace("kinopoisk.ru", "kinopoisk.net");
            window.open(newUrl, "_blank");
        }
    }
    </script>
</body>
</html>
