<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск фильмов</title>
    <style>
        body { background:#111; color:white; font-family:Arial; text-align:center; padding-top:100px; }
        input { width:500px; padding:18px; font-size:22px; border-radius:10px; border:none; }
        button { padding:18px 35px; font-size:22px; background:#e50914; color:white; border:none; border-radius:10px; cursor:pointer; }
    </style>
</head>
<body>
    <h1>Поиск фильмов</h1>
    
    <input type="text" id="film" placeholder="Название фильма" onkeydown="if(event.key === 'Enter') openKP()" />
    <button onclick="openKP()">Найти</button>

    <script>
    async function openKP() {
        let query = document.getElementById("film").value.trim();
        if (!query) return;

        let searchUrl = "https://www.kinopoisk.ru/index.php?kp_query=" + encodeURIComponent(query);
        
        try {
            let response = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(searchUrl));
            let data = await response.json();
            let html = data.contents;

            let regex = new RegExp('href="(/film/\\d+/)"[^> .*+?^${}()|[\]\\]/g, '\\$&') + '\\s*<', 'i');
            let match = html.match(regex);

            if (match) {
                let filmPage = "https://www.kinopoisk.ru" + match[1];
                let finalUrl = filmPage.replace("kinopoisk.ru", "kinopoisk.net");
                window.open(finalUrl, "_blank");
            } else {
                let fallback = "https://www.kinopoisk.ru/index.php?kp_query=" + encodeURIComponent(query);
                window.open(fallback, "_blank");
            }
        } catch(e) {
            window.open("https://www.kinopoisk.ru/index.php?kp_query=" + encodeURIComponent(query), "_blank");
        }
    }
    </script>
</body>
</html>
