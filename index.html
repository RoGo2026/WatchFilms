<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск фильмов</title>
    <style>
        body { background:#111; color:white; font-family:Arial; text-align:center; padding-top:60px; }
        input { width:520px; padding:16px; font-size:19px; border-radius:10px; border:none; margin:12px 0; }
        button { padding:16px 35px; font-size:19px; background:#e50914; color:white; border:none; border-radius:10px; cursor:pointer; margin:10px; }
    </style>
</head>
<body>
    <h1>Поиск фильмов</h1>
    
    <input type="text" id="movie" placeholder="Название фильма" onkeydown="if(event.key === 'Enter') searchMovie()" />
    <button onclick="searchMovie()">Найти</button>

    <script>
    function searchMovie() {
        let name = document.getElementById("movie").value.trim();
        if (!name) return;

        let googleSearch = "https://www.google.com/search?q=site%3Akinopoisk.ru+" + encodeURIComponent(name);
        window.open(googleSearch, "_blank");
    }
    </script>
</body>
</html>
