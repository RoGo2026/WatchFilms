<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск фильмов</title>
    <style>
        body { background:#111; color:white; font-family:Arial; text-align:center; padding:30px 15px; margin:0; }
        input { width:100%; max-width:580px; padding:18px; font-size:19px; border-radius:12px; border:none; margin:12px 0; }
        button { width:100%; max-width:580px; padding:18px; font-size:20px; background:#e50914; color:white; border:none; border-radius:12px; margin:10px 0; font-weight:bold; }
        .paste-btn { background:#0066cc; }
        .warning { color:#ffcc00; font-size:15px; margin:15px 0; }
    </style>
</head>
<body>
    <h1>Поиск фильмов</h1>

    <input type="text" id="link" placeholder="https://www.kinopoisk.ru/film/..." />

    <button onclick="changeDomain()">Открыть с плеером</button>
    <button onclick="pasteAndOpen()" class="paste-btn">📋 Вставить из буфера и открыть</button>

    <div class="warning">
        ⚠️ Кнопка "Вставить из буфера" работает только если сайт открыт по <strong>HTTPS</strong><br>
       [](https://RoGo2026.github.io/...)<br><br>
        Если не работает — зажмите поле выше и выберите «Вставить»
    </div>

    <script>
    async function pasteAndOpen() {
        try {
            const text = await navigator.clipboard.readText();
            
            if (text && text.length > 10) {
                document.getElementById("link").value = text;
                const newUrl = text.replace("kinopoisk.ru", "kinopoisk.net");
                window.open(newUrl, "_blank");
            } else {
                alert("Буфер обмена пуст");
            }
        } catch (err) {
            alert("Не удалось прочитать буфер обмена.\n\nЗажмите поле и выберите «Вставить» вручную.");
        }
    }

    function changeDomain() {
        let url = document.getElementById("link").value.trim();
        if (url) {
            let newUrl = url.replace("kinopoisk.ru", "kinopoisk.net");
            window.open(newUrl, "_blank");
        }
    }
    </script>
</body>
</html>
