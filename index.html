<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фильмы</title>
    <style>
        body { background:#111; color:white; font-family:Arial; text-align:center; padding:20px; margin:0; }
        input { width:100%; max-width:580px; padding:17px; font-size:19px; border-radius:12px; border:none; margin:12px 0; box-sizing:border-box; }
        button { width:100%; max-width:580px; padding:17px; font-size:19px; background:#e50914; color:white; border:none; border-radius:12px; margin:8px 0; font-weight:bold; }
        .paste-btn { background:#0066cc; }
        .info { margin-top:35px; font-size:15px; opacity:0.8; }
    </style>
</head>
<body>

    <h1>Поиск фильмов</h1>
    
    <input type="text" id="search" placeholder="Название фильма" onkeydown="if(event.key === 'Enter') openSearch()" />
    <button onclick="openSearch()">Открыть поиск</button>

    <h2>Вставь ссылку с Кинопоиска</h2>
    <input type="text" id="link" placeholder="Вставьте ссылку сюда..." />

    <button onclick="changeDomain()">Открыть с плеером</button>
    <button onclick="pasteFromClipboard()" class="paste-btn">📋 Вставить из буфера и открыть</button>

    <div class="info">
        Если кнопка не работает — просто зажмите поле сверху и выберите "Вставить"
    </div>

    <script>
    function openSearch() {
        let name = document.getElementById("search").value.trim();
        if (name) window.open("https://www.kinopoisk.ru/index.php?kp_query=" + encodeURIComponent(name), "_blank");
    }

    function changeDomain() {
        let url = document.getElementById("link").value.trim();
        if (url) {
            let newUrl = url.replace("kinopoisk.ru", "kinopoisk.net");
            window.open(newUrl, "_blank");
        }
    }

    async function pasteFromClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            if (text) {
                document.getElementById("link").value = text;
                let newUrl = text.replace("kinopoisk.ru", "kinopoisk.net");
                window.open(newUrl, "_blank");
            }
        } catch (e) {
            alert("Не получилось прочитать буфер.\n\nЗажмите поле выше и выберите «Вставить»");
        }
    }
    </script>
</body>
</html>
