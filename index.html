<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КиноПоиск - Поиск фильмов</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Декоративные картинки (появятся на больших экранах) -->
  <div class="wallpaper-decoration">
    <!-- Левая сторона -->
    <img src="img/dune.jpg" class="deco-img deco-left-1" alt="">
    <img src="img/lotr.jpg" class="deco-img deco-left-2" alt="">
    
    <!-- Правая сторона -->
    <img src="img/godzilla.jpg" class="deco-img deco-right-1" alt="">
    <img src="img/batman.jpg" class="deco-img deco-right-2" alt="">
    
    <!-- Внизу -->
    <img src="img/avatar.jpg" class="deco-img deco-bottom" alt="">
  </div>

  <!-- Основной контент -->
  <div class="container">
    <header class="header">
      <h1>🎬 КиноПоиск</h1>
      <p>Найди любимый фильм за секунду</p>
    </header>

    <div class="search-box">
      <input type="text" id="movieInput" placeholder="Введите название фильма..." autocomplete="off">
      <button id="searchButton">Найти</button>
    </div>

    <div id="loading" class="loading hidden"> Ищем фильмы...</div>
    <div id="error" class="error hidden"></div>
    <div id="results" class="results"></div>

    <div class="note">
      <p>Чтобы отключить рекламу:</p>
      <code id="dnsLink" class="clickable-link" onclick="copyDnsLink()">https://dns.adguard-dns.com/dns-query</code>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
