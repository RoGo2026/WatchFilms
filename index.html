<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск фильмов</title>
    <style>
        body { background:#111; color:white; font-family:Arial; text-align:center; padding-top:60px; }
        input { width:520px; padding:16px; font-size:19px; border-radius:10px; border:none; margin:12px 0; }
        button { padding:16px 35px; font-size:19px; background:#e50914; color:white; border:none; border-radius:10px; cursor:pointer; margin:8px; }
        h2 { margin:40px 0 15px 0; }
    </style>
</head>
<body>
    <h1>Поиск фильмов</h1>
    
    <input type="text" id="search" placeholder="Название фильма" onkeydown="if(event.key === 'Enter') openSearch()" />
    <button onclick="openSearch()">Открыть поиск</button>

    <h2>Вставь ссылку с Кинопоиска</h2>
    <input type="text" id="link" placeholder="https://www.kinopoisk.ru/film/XXXXXX/" style="width:400px;" />
    <button onclick="changeDomain()">Открыть с плеером</button>
    <button onclick="pasteAndOpen()">Вставить из буфера и открыть</button>

    <script>
    function openSearch() {
        let name = document.getElementById("search").value.trim();
        if (name) {
            let url = "https://www.kinopoisk.ru/index.php?kp_query=" + encodeURIComponent(name);
            window.open(url, "_blank");
        }
    }

    function changeDomain() {
        let url = document.getElementById("link").value.trim();
        if (url) {
            let newUrl = url.replace("kinopoisk.ru", "kinopoisk.net");
            window.open(newUrl, "_blank");
        }
    }

    async function pasteAndOpen() {
        try {
            let text = await navigator.clipboard.readText();
            if (text.includes("kinopoisk.ru")) {
                let newUrl = text.replace("kinopoisk.ru", "kinopoisk.net");
                window.open(newUrl, "_blank");
            } else {
                alert("В буфере нет ссылки с Кинопоиска");
            }
        } catch(e) {
            alert("Не удалось прочитать буфер обмена");
        }
    }
    </script>
</body>
</html>
